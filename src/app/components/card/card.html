 <div appFadeOnHover>
 <div class="card-container" *ngIf="article">
    <div class="img">
       <img [src]="article?.urlToImage" [appImgFallback]="'images.jpg'" class="card-image">
    </div>
    <div class="title">
      <h2 [appNewBadge]="article?.publishedAt">{{ article?.title }}</h2>
    </div>
    <div class="author">Author: {{ article?.author }}</div>
    <div class="content">{{ article?.content }}</div>
    <div class="description">{{ article?.description }}</div>
    <div class="date">Publish: {{ article?.publishedAt | date }}</div>
    <div class="link"><a [href]="article?.url" target="_blank" class="card-link">Read more</a></div>
  </div>
 </div>
